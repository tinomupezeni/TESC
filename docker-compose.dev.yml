services:
  backend:
    command: python manage.py runserver 0.0.0.0:8000

  frontend-client-v2:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host 0.0.0.0 --port 80
    volumes:
      - ./frontend:/app
      - frontend_client_node_modules:/app/node_modules
    ports:
      - "8081:80"

  frontend-admin-v2:
    build:
      context: ./inst
      target: build
    command: npm run dev -- --host 0.0.0.0 --port 80
    volumes:
      - ./inst:/app
      - frontend_admin_node_modules:/app/node_modules
    ports:
      - "8082:80"

volumes:
  frontend_client_node_modules:
  frontend_admin_node_modules:
