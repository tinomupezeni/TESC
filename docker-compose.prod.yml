version: '3.8'

# ============================================
# TESC Production Docker Compose
# Uses images from GitHub Container Registry
# ============================================

services:
  # --- Reverse Proxy (Security & Routing) ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend_client
      - frontend_admin
    networks:
      - main_net
    restart: unless-stopped

  # --- Cache (Performance) ---
  redis:
    image: redis:alpine
    networks:
      - main_net
    restart: unless-stopped

  # --- Database ---
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - main_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (Django + Gunicorn) ---
  backend:
    image: ghcr.io/tinomupezeni/tesc-backend:latest
    build: ./backend
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - DEBUG=False
    # Note: No ports exposed to host directly! Safe behind Nginx.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main_net
    restart: unless-stopped

  # --- Background Worker (Celery) ---
  celery_worker:
    image: ghcr.io/tinomupezeni/tesc-backend:latest
    build: ./backend
    # This container runs the exact same code, but uses the 'celery' command instead of gunicorn!
    command: celery -A core worker --loglevel=info
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main_net
    restart: unless-stopped

  # --- Frontend (Public Portal/Dashboard) ---
  frontend_client:
    image: ghcr.io/tinomupezeni/tesc-frontend:latest
    build: ./frontend
    # Note: No ports exposed to host directly! Safe behind Nginx.
    networks:
      - main_net
    restart: unless-stopped

  # --- Frontend (Institution/Admin Portal) ---
  frontend_admin:
    image: ghcr.io/tinomupezeni/tesc-inst:latest
    build: ./inst
    # Note: No ports exposed to host directly! Safe behind Nginx.
    networks:
      - main_net
    restart: unless-stopped

volumes:  
  postgres_data:

networks:
  main_net:
    driver: bridge
