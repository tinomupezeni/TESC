# Define the groups of servers using Docker service names
upstream client_app {
    server frontend_client_v2:80;
    keepalive 32;
}

upstream admin_app {
    server frontend_admin_v2:80;
    keepalive 32;
}

upstream backend_api {
    server backend:8000;
    keepalive 32;
}

server {
    listen 8081 default_server;
    server_name tesc.zchpc.ac.zw 10.50.200.35;

    # Performance Optimizations
    client_max_body_size 20M;
    keepalive_timeout 65;
    
    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://client_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        proxy_pass http://backend_api;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

server {
    listen 8082;
    server_name tesc-inst.zchpc.ac.zw 10.50.200.35;

    client_max_body_size 20M;
    keepalive_timeout 65;

    location / {
        proxy_pass http://admin_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 8000;
    server_name 10.50.200.35;

    client_max_body_size 20M;

    location / {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}