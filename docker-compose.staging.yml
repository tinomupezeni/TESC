version: '3.8'

services:
  redis:
    image: redis:alpine
    networks:
      - staging_net

  db:
    image: postgres:15
    volumes:
      - tesc_postgres_data_staging:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - staging_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tesc-backend-staging-v2:
    build: ./backend
    container_name: tesc-backend-staging-v2
    command: tail -f /dev/null
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - staging_net

volumes:  
  tesc_postgres_data_staging:

networks:
  staging_net:
    driver: bridge
